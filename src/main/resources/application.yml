server:
  port: 8081

spring:
  application:
    name: wifi-admin

  datasource:
    url: jdbc:h2:file:./data/wifiadmin
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  jackson:
    default-property-inclusion: non_null

platform:
  soap:
    url: http://localhost:8080/platform
    default-uri: http://localhost:8080/platform

sync:
  cron: 0 0 2 * * ?
  cpe-ids-per-run: 50

logging:
  level:
    com.wifiadmin: DEBUG
    org.springframework.ws: DEBUG
    org.springframework.ws.client.MessageTracing: DEBUG
